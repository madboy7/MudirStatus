<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script>
      // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to polyfill fetch in environments where it's a read-only getter.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Attempt to overwrite fetch ignored'); }
            });
          }
        } catch (e) {
          // If the above fails, it means window.fetch is already non-configurable.
          // We can't fix the assignment error in that case, but we can try to 
          // ensure fetch is available globally in other ways if needed.
        }
      })();
    </script>
    <title>MudirStatus - حالة المدير</title>
    
    <!-- PWA Settings for iOS -->
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="حالة المدير">
